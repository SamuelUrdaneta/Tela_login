<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container mt-5">
            <div class="row justify-content-md-center">
                <div class="col col-lg-2">
                    <div class="card" style="width: 18rem;">
                        <div class="container">
                            <div class="container text-center">
                                <br>
                                <h2 id="titulo">Login</h2>
                            </div>
                            <form id="form-login">
                                <div id="c-email" class="conjunto">
                                    <label for="exampleInputEmail1" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="exampleInputEmail1"
                                        aria-describedby="emailHelp" placeholder="Digite seu email" required>
                                </div>
                                <br>
                                <div id="c-senha" class="conjunto">
                                        <label for="exampleInputPassword1" class="form-label">Senha</label>
                                        <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Digite sua senha"  required>
                                </div>
                                <br>
                                <div class="d-grid gap-2 ">
                                    <button id="botao-envio" type="submit" class="btn btn-primary">Entrar</button>
                                </div>
                            </form>
                            <div id="mensagem"></div>
                            <div class="container text-center">
                                <div class="toggle" id="toggle">
                                    <p>Não tem conta? <a href="">Cadastre-se</a></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </main>

    <footer>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="scripts/script.js"></script>
</body>

</html>
